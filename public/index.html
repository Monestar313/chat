<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المراسلات الخاصة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" id="app">
    <!-- الشريط الجانبي -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>✦ خصوصي</h2>
        <div class="user-badge">
          <span id="sidebarUsername"></span>
          <div class="status-selector">
            <span class="status-dot" id="myStatusDot">●</span>
            <select id="statusSelect">
              <option value="online">🟢 متصل</option>
              <option value="away">🟡 بعيد</option>
              <option value="busy">🔴 مشغول</option>
            </select>
          </div>
          <button class="logout-btn" id="logoutBtn">خروج</button>
        </div>
      </div>

      <!-- البحث -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن صديق..." autocomplete="off">
        <span class="search-icon">⌕</span>
        <div class="search-results" id="searchResults"></div>
      </div>

      <!-- تبويبات -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="friends">الأصدقاء</button>
        <button class="sidebar-tab" data-tab="groups" id="groupsTab">المجموعات</button>
        <button class="sidebar-tab" data-tab="requests" id="requestsTab">
          الطلبات <span class="badge" id="requestsBadge" style="display:none">0</span>
        </button>
      </div>

      <div class="sidebar-content">
        <!-- قائمة الأصدقاء -->
        <div class="tab-panel active" id="panelFriends">
          <div class="scroll-list" id="friendsList"></div>
        </div>

        <!-- قائمة المجموعات -->
        <div class="tab-panel" id="panelGroups">
          <div class="scroll-list" id="groupsList"></div>
          <div class="sidebar-footer-action">
            <button class="create-group-btn" id="createGroupBtn">+ مجموعة جديدة</button>
          </div>
        </div>

        <!-- قائمة الطلبات -->
        <div class="tab-panel" id="panelRequests">
          <div class="scroll-list" id="requestsList"></div>
        </div>
      </div>
    </aside>

    <!-- المنطقة الرئيسية -->
    <main class="main-area" id="mainArea">
      <div class="loading-bar" id="loadingBar"></div>

      <!-- الشاشة الافتراضية -->
      <div class="no-call-screen" id="noCallScreen">
        <span class="icon">✦</span>
        <h2>اختر صديقاً للاتصال أو المراسلة</h2>
        <p>اضغط 💬 لفتح المحادثة أو 📞 للاتصال</p>
      </div>

      <!-- منطقة المحادثة النصية -->
      <div class="chat-area" id="chatArea" style="display:none">
        <div class="chat-header" id="chatHeader">
          <span id="chatPartnerName">صديق</span>
          <div class="chat-actions">
            <button class="chat-call-btn" id="chatCallBtn" title="اتصال">📞</button>
            <button class="chat-close-btn" id="chatCloseBtn" title="إغلاق">✕</button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <button class="chat-file-btn" id="chatFileBtn" title="إرفاق صورة">📎</button>
          <input type="text" id="chatInput" placeholder="اكتب رسالة..." autocomplete="off">
          <button class="chat-send-btn" id="chatSendBtn">إرسال</button>
          <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>
      </div>

      <!-- حاوية الفيديو -->
      <div class="video-container" id="videoContainer">
        <div class="remote-video-wrapper" id="remoteVideoWrapper">
          <video id="remoteVideo" autoplay playsinline></video>
          <div class="label" id="remoteLabel">الطرف الآخر</div>
        </div>
        <div class="local-video-wrapper" id="localVideoWrapper">
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="label">أنت</div>
        </div>

        <!-- Placeholder للصوت فقط -->
        <div class="audio-only-placeholder" id="audioPlaceholder" style="display:none">
          <div class="big-avatar" id="audioAvatar">?</div>
          <div class="call-name" id="audioCallName">متصل</div>
          <div class="call-status">🎧 مكالمة صوتية</div>
        </div>
      </div>

      <!-- أزرار التحكم -->
      <div class="controls" id="controls" style="display:none">
        <button class="control-btn toggle" id="toggleMic" title="كتم المايكروفون">🎤</button>
        <button class="control-btn toggle" id="toggleCam" title="إيقاف الكاميرا">📷</button>
        <button class="control-btn toggle" id="toggleScreen" title="مشاركة الشاشة">🖥️</button>
        <button class="control-btn end-call" id="endCall" title="إنهاء المكالمة">✕</button>
      </div>
    </main>

    <!-- نافذة الاتصال الوارد -->
    <div class="incoming-call-overlay" id="incomingOverlay">
      <div class="incoming-card">
        <div class="incoming-avatar" id="incomingAvatar">?</div>
        <h2 id="incomingName">متصل...</h2>
        <p class="call-type" id="incomingType">مكالمة واردة</p>
        <div class="incoming-actions">
          <button class="btn-reject" id="rejectCallBtn">✕</button>
          <button class="btn-accept" id="acceptCallBtn">✓</button>
        </div>
      </div>
    </div>

    <!-- نافذة إنشاء مجموعة -->
    <div class="modal-overlay" id="createGroupModal">
      <div class="modal-card">
        <h3>إنشاء مجموعة جديدة</h3>
        <input type="text" id="groupNameInput" placeholder="اسم المجموعة..." autocomplete="off">
        <div class="modal-subtitle">اختر الأصدقاء:</div>
        <div class="modal-members-list" id="groupMembersList"></div>
        <div class="modal-actions">
          <button class="modal-cancel" id="cancelGroupBtn">إلغاء</button>
          <button class="modal-confirm" id="confirmGroupBtn">إنشاء</button>
        </div>
      </div>
    </div>

    <!-- توست -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="main.js"></script>
</body>
</html>
