<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>📝 حساب جديد</h1>
    <p class="subtitle">انضم إلى المراسلات الخاصة</p>
    <form id="registerForm">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="username" placeholder="3 أحرف على الأقل" required autofocus>
      </div>
      <div class="form-group">
        <label>الاسم المعروض (اختياري)</label>
        <input type="text" id="displayName" placeholder="الاسم الذي سيظهر للآخرين">
      </div>
      <div class="form-group">
        <label>كلمة السر</label>
        <input type="password" id="password" placeholder="4 أحرف على الأقل" required>
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <button type="submit" class="btn-primary">تسجيل</button>
    </form>
    <p class="auth-link">عندك حساب؟ <a href="login.html">سجّل دخول</a></p>
  </div>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const displayName = document.getElementById('displayName').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, displayName })
        });
        const data = await res.json();
        if (!res.ok) return errorEl.textContent = data.error;
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = 'خطأ في الاتصال بالسيرفر';
      }
    });
  </script>
</body>
</html>
