<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>🔐 دخول</h1>
    <p class="subtitle">المراسلات الخاصة</p>
    <form id="loginForm">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="username" placeholder="أدخل اسم المستخدم" required autofocus>
      </div>
      <div class="form-group">
        <label>كلمة السر</label>
        <input type="password" id="password" placeholder="أدخل كلمة السر" required>
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <button type="submit" class="btn-primary">دخول</button>
    </form>
    <p class="auth-link">ما عندك حساب؟ <a href="register.html">سجّل الآن</a></p>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) return errorEl.textContent = data.error;
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = 'خطأ في الاتصال بالسيرفر';
      }
    });
  </script>
</body>
</html>
